name: OpenAPI

on:
  workflow_dispatch:
  pull_request:
    paths:
      - .github/workflows/openapi.yml
      - Makefile
      - go.mod
      - go.sum
      - openapi/**
      - scripts/**
      - tools/openapi-validate/**
      - internal/tcgapi/generated/**
  push:
    paths:
      - .github/workflows/openapi.yml
      - Makefile
      - go.mod
      - go.sum
      - openapi/**
      - scripts/**
      - tools/openapi-validate/**
      - internal/tcgapi/generated/**

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      GOCACHE: /tmp/tcgapi-mcp-go-cache
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Validate OpenAPI snapshot
        run: make openapi-validate

      - name: Check generated bindings
        run: make generate-check
